<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hébergements · 80 ans à Brassempouy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #FAFAF8;
      --surface: #FFFFFF;
      --surface2:#F5F2EC;
      --border:  rgba(26,22,18,0.1);
      --text:    #1A1612;
      --muted:   #7A7168;
      --light:   #B0A898;
      --gold:    #b8902e;
      --gold-l:  #d4a94a;
      --hotel:   #2563eb;
      --gite:    #059669;
      --chambre: #ea580c;
      --venue:   #7c3aed;
      --radius:  0px;
      --font-serif: 'Cormorant Garant', Georgia, serif;
      --font-sans:  'Montserrat', sans-serif;
    }

    html, body { height: 100%; font-family: var(--font-sans); background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── HEADER ─────────────────────────────────────────────────────── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: 60px;
      background: rgba(250,250,248,0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 24px; gap: 16px;
    }
    .header-back {
      font-size: 0.68em; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted); text-decoration: none;
      transition: color 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .header-back:hover { color: var(--gold); }
    .header-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
    .header-text h1 {
      font-family: var(--font-serif);
      font-size: 1.15em; font-weight: 400; color: var(--text);
      line-height: 1.2; letter-spacing: 0.02em;
    }
    .header-text p { font-size: 0.68em; color: var(--muted); margin-top: 1px; font-weight: 300; letter-spacing: 0.05em; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(184,144,46,0.08); border: 1px solid rgba(184,144,46,0.25);
      color: var(--gold); font-size: 0.68em; font-weight: 500;
      padding: 4px 12px; border-radius: 2px; letter-spacing: 0.08em;
      font-family: var(--font-sans);
    }

    /* ── LAYOUT ─────────────────────────────────────────────────────── */
    #app { display: flex; height: 100vh; padding-top: 60px; }
    #map { flex: 1; position: relative; }

    /* ── SIDEBAR ─────────────────────────────────────────────────────── */
    #sidebar {
      width: 360px; flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* Filters */
    #filter-zone {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 10px;
    }
    .filter-label { font-size: 0.62em; font-weight: 600; color: var(--light); text-transform: uppercase; letter-spacing: 0.15em; }
    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn {
      display: flex; align-items: center; gap: 5px;
      font-family: var(--font-sans);
      font-size: 0.7em; font-weight: 500;
      padding: 5px 11px;
      border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      cursor: pointer; transition: all 0.18s; border-radius: 2px;
    }
    .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
    .filter-btn .dot { width: 7px; height: 7px; border-radius: 50%; }
    .filter-btn.active { color: var(--text); background: var(--surface2); border-color: rgba(26,22,18,0.2); }
    .filter-btn[data-type="all"].active  { background: rgba(184,144,46,0.08); border-color: rgba(184,144,46,0.3); color: var(--gold); }
    .filter-btn[data-type="hotel"].active   { background: rgba(37,99,235,0.07);  border-color: rgba(37,99,235,0.3);  color: var(--hotel); }
    .filter-btn[data-type="gite"].active    { background: rgba(5,150,105,0.07);  border-color: rgba(5,150,105,0.3);  color: var(--gite); }
    .filter-btn[data-type="chambre"].active { background: rgba(234,88,12,0.07);  border-color: rgba(234,88,12,0.3);  color: var(--chambre); }

    .count-info {
      padding: 9px 16px;
      font-size: 0.7em; color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .count-num { font-size: 1.3em; font-weight: 600; color: var(--text); margin-right: 5px; font-family: var(--font-serif); }

    /* Cards list */
    #list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
    #list::-webkit-scrollbar { width: 3px; }
    #list::-webkit-scrollbar-track { background: transparent; }
    #list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 12px 14px;
      cursor: pointer;
      transition: all 0.18s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; bottom: 0; width: 2px;
      background: var(--gold);
      opacity: 0; transition: opacity 0.18s;
    }
    .card:hover { border-color: rgba(184,144,46,0.3); background: var(--surface2); }
    .card.active { border-color: rgba(184,144,46,0.4); background: rgba(184,144,46,0.04); }
    .card.active::before { opacity: 1; }

    .card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 7px; }
    .card-icon {
      width: 32px; height: 32px; border-radius: 4px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 0.9em;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-name { font-size: 0.82em; font-weight: 500; color: var(--text); line-height: 1.3; }
    .card-addr { font-size: 0.68em; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-badge {
      font-size: 0.6em; font-weight: 600; padding: 2px 7px;
      border-radius: 2px; white-space: nowrap; flex-shrink: 0;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .card-note { font-size: 0.68em; color: var(--muted); font-style: italic; margin-bottom: 7px; line-height: 1.5; }
    .card-bottom { display: flex; align-items: center; justify-content: space-between; }
    .card-dist { display: flex; align-items: center; gap: 4px; font-size: 0.68em; color: var(--light); }
    .card-dist::before { content: '📍'; font-size: 0.9em; }
    .card-links { display: flex; gap: 4px; }
    .card-link {
      font-size: 0.64em; font-weight: 500; padding: 3px 8px;
      border-radius: 2px; text-decoration: none;
      border: 1px solid; transition: opacity 0.15s; letter-spacing: 0.04em;
    }
    .card-link:hover { opacity: 0.7; }
    .link-booking { color: var(--hotel); border-color: rgba(37,99,235,0.25); background: rgba(37,99,235,0.06); }
    .link-airbnb  { color: #e11d48; border-color: rgba(225,29,72,0.25); background: rgba(225,29,72,0.06); }
    .link-web     { color: var(--muted); border-color: var(--border); background: var(--surface2); }

    /* ── MAP styles ─────────────────────────────────────────────────── */
    .leaflet-container { background: #EDE9E0 !important; }
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 0 !important;
      box-shadow: 0 8px 32px rgba(26,22,18,0.12) !important;
      padding: 0 !important; overflow: hidden !important; color: var(--text) !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-content { margin: 0 !important; width: auto !important; min-width: 220px; }
    .leaflet-control-zoom {
      border: 1px solid var(--border) !important; border-radius: 2px !important;
      overflow: hidden; box-shadow: 0 2px 8px rgba(26,22,18,0.08) !important;
    }
    .leaflet-control-zoom a {
      background: var(--surface) !important; color: var(--text) !important;
      border: none !important; border-bottom: 1px solid var(--border) !important;
      width: 30px !important; height: 30px !important; line-height: 30px !important;
      font-size: 1em !important; transition: background 0.15s !important;
    }
    .leaflet-control-zoom a:hover { background: var(--surface2) !important; }
    .leaflet-control-zoom a:last-child { border-bottom: none !important; }
    .leaflet-control-attribution {
      background: rgba(250,250,248,0.85) !important; color: var(--light) !important;
      font-size: 9px !important;
    }

    /* Popup inner */
    .popup-inner { padding: 14px; }
    .popup-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .popup-emoji { font-size: 1em; }
    .popup-title { font-family: var(--font-serif); font-size: 1em; font-weight: 400; color: var(--text); flex: 1; }
    .popup-sub { font-size: 0.7em; color: var(--muted); margin-bottom: 4px; }
    .popup-note {
      font-size: 0.7em; color: var(--muted); font-style: italic;
      margin-bottom: 10px; border-top: 1px solid var(--border); padding-top: 8px;
    }
    .popup-links { display: flex; gap: 5px; flex-wrap: wrap; }
    .popup-link {
      font-size: 0.66em; font-weight: 500; padding: 4px 10px; border-radius: 2px;
      text-decoration: none; border: 1px solid; transition: opacity 0.15s;
      letter-spacing: 0.04em;
    }
    .popup-link:hover { opacity: 0.7; }

    /* Legend overlay */
    #legend-box {
      position: absolute; bottom: 20px; left: 16px; z-index: 999;
      background: rgba(250,250,248,0.95); backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      box-shadow: 0 4px 16px rgba(26,22,18,0.1);
      padding: 12px 14px; min-width: 160px;
    }
    .legend-title {
      font-size: 0.6em; font-weight: 600; color: var(--light);
      text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 8px;
    }
    .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 0.72em; color: var(--text); }
    .legend-row:last-child { margin-bottom: 0; }
    .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* ── RESPONSIVE (mobile) ────────────────────────────────────────── */
    @media (max-width: 640px) {
      html, body { overflow: auto; height: auto; }

      header { padding: 0 14px; height: 52px; }
      .header-text h1 { font-size: 0.88em; }
      .header-text p  { display: none; }
      .pill           { display: none; }

      #app {
        flex-direction: column;
        height: auto;
        min-height: calc(100vh - 52px);
        padding-top: 52px;
      }

      #map {
        flex: none;
        height: 45vh;
        min-height: 220px;
      }

      #sidebar {
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: none;
        overflow: visible;
      }

      #list {
        max-height: 50vh;
      }

      #legend-box {
        bottom: 10px;
        left: 10px;
        padding: 8px 10px;
      }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="header-back">← Retour</a>
  <div class="header-sep"></div>
  <div class="header-text">

      <div class="legend-row"><div class="leg-dot" style="background:var(--gite)"></div>Gîte</div>
      <div class="legend-row"><div class="leg-dot" style="background:var(--chambre)"></div>Chambre d'hôtes</div>

  </div>
  <div id="sidebar">

        <button class="filter-btn" data-type="chambre">

      <span style="font-size:0.68em">Triés par distance</span>
    </div>

    <div id="list"></div>
  </div>
</div>

    note: "Logis · piscine chauffée · restaurant (Chef Marie Larrouture) · 9/10 (880 avis) · depuis ~74€/nuit",
    booking: bookingUrl("auberge-du-relais"),
    web: "https://www.auberge-du-relais.com"
  },
  {
    name: "Kyriad Orthez ★★★",
    lat: 43.4836, lng: -0.7553, type: "hotel", dist: 30,
    address: "Route de Pau, 64300 Orthez",
    note: "24 chambres · restaurant · parking · accès A64 · depuis ~67€/nuit",
    booking: bookingUrl("kyriad-orthez"),
    web: "https://orthez.kyriad.com"
  },
  {
    name: "Greet Hôtel Orthez ★★★",
    lat: 43.491, lng: -0.760, type: "hotel", dist: 30,
    address: "Avenue Marcel Paul, 64300 Biron (Orthez)",
    note: "Piscine eau salée · fitness · éco-responsable · buffet local · depuis ~60€/nuit",
    booking: bookingUrl("greet-orthez-bearn"),
    web: "https://all.accor.com/hotel/B8C5/index.en.shtml"
  }
];

// ── Map init ───────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: false }).setView([VENUE.lat, VENUE.lng], 11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

L.control.zoom({ position: 'topright' }).addTo(map);

// 30 km radius circle
L.circle([VENUE.lat, VENUE.lng], {
  radius: 30000,
  color: '#b8902e', weight: 1.5, dashArray: '6 5',
  fillColor: '#b8902e', fillOpacity: 0.04
}).addTo(map);

// ── Pin marker factory ────────────────────────────────────────────────────
function makePin(color, isVenue = false) {
  if (isVenue) {
    // Large gold star pin for the manor
    return L.divIcon({
      className: '',
      html: `<div style="position:relative;width:44px;height:52px">
        <div style="
          position:absolute;top:0;left:0;
          width:44px;height:44px;border-radius:50% 50% 50% 0;
          transform:rotate(-45deg);
          background:#b8902e;
          box-shadow:0 3px 10px rgba(184,144,46,0.5),0 0 0 3px white;
        "></div>
        <div style="
          position:absolute;top:5px;left:5px;
          width:34px;height:34px;border-radius:50%;
          background:white;
          display:flex;align-items:center;justify-content:center;
          font-size:16px;line-height:1;
        ">★</div>
        <div style="
          position:absolute;bottom:0;left:50%;transform:translateX(-50%);
          width:6px;height:10px;
          background:#b8902e;
          clip-path:polygon(0 0,100% 0,50% 100%);
        "></div>
      </div>`,
      iconSize: [44, 52],
      iconAnchor: [22, 52],
      popupAnchor: [0, -54]
    });
  }
  return L.divIcon({
    className: '',
    html: `<div style="position:relative;width:28px;height:36px">
      <div style="
        position:absolute;top:0;left:0;
        width:28px;height:28px;border-radius:50% 50% 50% 0;
        transform:rotate(-45deg);
        background:${color};
        box-shadow:0 2px 6px rgba(0,0,0,0.25),0 0 0 2px white;
      "></div>
      <div style="
        position:absolute;top:5px;left:5px;
        width:18px;height:18px;border-radius:50%;
        background:white;opacity:0.85;
      "></div>
    </div>`,
    iconSize: [28, 36],
    iconAnchor: [14, 36],
    popupAnchor: [0, -38]
  });
}

// ── Popup builder ─────────────────────────────────────────────────────────
const TYPE_LABEL = { hotel: 'Hôtel', gite: 'Gîte', chambre: "Chambre d'hôtes", venue: 'Lieu de fête' };
const TYPE_EMOJI = { hotel: '🏨', gite: '🏡', chambre: '🌸', venue: '⭐' };

function buildLinks(h) {
  let html = '<div class="popup-links">';
  if (h.booking) html += `<a href="${h.booking}" target="_blank" class="popup-link link-booking">Booking</a>`;
  if (h.airbnb)  html += `<a href="${h.airbnb}"  target="_blank" class="popup-link link-airbnb">Airbnb</a>`;
  if (h.web)     html += `<a href="${h.web}"     target="_blank" class="popup-link link-web">Site web</a>`;
  if (!h.booking && !h.airbnb && !h.web) html += `<span style="font-size:0.7em;color:#9a9080">Pas de lien direct</span>`;
  html += '</div>';
  return html;
}

function buildPopup(h, isVenue = false) {
  return `<div class="popup-inner">
    <div class="popup-header">
      <span class="popup-emoji">${TYPE_EMOJI[h.type]}</span>
      <span class="popup-title">${h.name}</span>
    </div>
    <div class="popup-sub">${isVenue ? h.sub : `${TYPE_LABEL[h.type]} · ${h.dist} km du Manoir`}</div>
    <div class="popup-sub">${h.address}</div>
    ${h.note ? `<div class="popup-note">${h.note}</div>` : ''}
    ${buildLinks(h)}
    ${!isVenue ? `<div style="font-size:0.62em;color:#b8902e;margin-top:6px;font-style:italic">Liens pré-remplis pour le 25 juillet 2026</div>` : ''}
  </div>`;
}

// ── Venue marker ───────────────────────────────────────────────────────────
L.marker([VENUE.lat, VENUE.lng], { icon: makePin(CSS_VARS.venue, true), zIndexOffset: 2000 })
  .addTo(map)
  .bindPopup(buildPopup(VENUE, true), { maxWidth: 270 });

// ── Hébergement markers ────────────────────────────────────────────────────
const allMarkers = HEBERGEMENTS.map(h => {
  const m = L.marker([h.lat, h.lng], { icon: makePin(CSS_VARS[h.type]) })
    .addTo(map)
    .bindPopup(buildPopup(h), { maxWidth: 270 });
  return { h, m };
});

// ── Sidebar card builder ───────────────────────────────────────────────────
const BG_ALPHA = {
  hotel:   'rgba(29,78,216,0.08)',
  gite:    'rgba(21,128,61,0.08)',
  chambre: 'rgba(194,65,12,0.08)'
};

function buildCard(h) {
  const color = CSS_VARS[h.type];
  const links = [
    h.booking ? `<a href="${h.booking}" target="_blank" class="card-link link-booking">Booking</a>` : '',
    h.airbnb  ? `<a href="${h.airbnb}"  target="_blank" class="card-link link-airbnb">Airbnb</a>`  : '',
    h.web     ? `<a href="${h.web}"     target="_blank" class="card-link link-web">Web</a>`        : ''
  ].join('');

  const badgeBg = `${color}18`;
  const badgeBorder = `${color}40`;

  return `
    <div class="card" data-name="${h.name}">
      <div class="card-top">
        <div class="card-icon" style="background:${BG_ALPHA[h.type] || 'rgba(0,0,0,0.04)'}">
          ${TYPE_EMOJI[h.type]}
        </div>
        <div class="card-info">
          <div class="card-name">${h.name}</div>
          <div class="card-addr">${h.address}</div>
        </div>
        <div class="card-badge" style="background:${badgeBg};border:1px solid ${badgeBorder};color:${color}">
          ${h.dist} km
        </div>
      </div>
      ${h.note ? `<div class="card-note">${h.note}</div>` : ''}
      <div class="card-bottom">
        <div class="card-dist">${h.dist} km du Manoir</div>
        <div class="card-links">${links || '<span style="font-size:0.66em;color:#b0a898">—</span>'}</div>
      </div>
    </div>`;
}

// ── Render + Filter ────────────────────────────────────────────────────────
let activeFilter = 'all';

function render() {
  const list = document.getElementById('list');
  const sorted = [...HEBERGEMENTS].sort((a, b) => a.dist - b.dist);
  const filtered = activeFilter === 'all' ? sorted : sorted.filter(h => h.type === activeFilter);

  document.getElementById('count-num').textContent = filtered.length;
  list.innerHTML = filtered.map(buildCard).join('');

  // Toggle map markers
  allMarkers.forEach(({ h, m }) => {
    if (activeFilter === 'all' || h.type === activeFilter) { if (!map.hasLayer(m)) m.addTo(map); }
    else { if (map.hasLayer(m)) map.removeLayer(m); }
  });

  // Card click → fly + popup
  list.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.tagName === 'A') return;
      const name = card.dataset.name;
      const found = allMarkers.find(({ h }) => h.name === name);
      if (!found) return;
      map.flyTo([found.h.lat, found.h.lng], 13, { duration: 0.8, easeLinearity: 0.3 });
      setTimeout(() => found.m.openPopup(), 850);
      list.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
    });
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.type;
    render();
  });
});

render();
</script>
</body>
</html>
